<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projeto_mapa</title>

    <!-- script -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen" class="glass-card">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h2>
        
        <div id="login-msg" class="message-box"></div>

        <form id="login-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" id="login-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Seu nome de usuário">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="login-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary mb-4">Entrar</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Não tem uma conta? 
            <a href="#" onclick="switchScreen('signup')" class="text-indigo-600 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>

    <!-- Tela de Cadastro -->
    <div id="signup-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Cadastro</h2>
        
        <div id="signup-msg" class="message-box"></div>

        <form id="signup-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Novo Usuário</label>
                <input type="text" id="signup-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Escolha um usuário">
            </div>

            
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome completo</label>
                <input type="text" id="signup-name" required class="w-full px-4 py-2 border
                border-gray-300 rounded-md" placeholder="Nome Completo">





            <div class="input-group mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">CEP</label>
            <input type="text" id="cep" maxlength="9"
              class="w-full px-4 py-2 border border-gray-300 rounded-md"
                placeholder="00000-000"
             onblur="pesquisacep(this.value)"
            oninput="mascaraCEP(this)">
        </div>
        
            </div>

             <div class="input-griup mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
                <input type="text" disabled id="signup-address" required class="w-full px-2 py-2 border
                border-gray-300 rouded-md" placeholder="digite o esdereço">
            </div>

            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700"></label>
                <input type="text" disabled id="signup-UF" required class="w-20 px-2 border
                border-gray-300" placeholder="uf">
            
                <input type="text" disabled id="signup-bairro" required class="w-25 px-2 border
                border-gray-300" placeholder="bairro">
            </div>

            <div class="input-griup mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Complemento</label>
                <input type="text" id="signup-complemento" required class="w-full px-2 border
                border-gray-300 rouded-md" placeholder="complemento">
            </div>

            <div class="input-griup mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
                <input type="text" id="signup-cpf" required class="w-full px-4 py-2 border
                border-gray-300 rouded-md" placeholder="digite o CPF">
            </div>
                   


            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="signup-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Mínimo 4 caracteres">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirme a senha</label>
                <input type="password" id="signup-confirm-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Mínimo 4 caracteres">
            </div>

            <button type="submit" class="btn-primary mb-4">Criar Conta</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Já possui conta? 
            <a href="#" onclick="switchScreen('login')" class="text-indigo-600 font-semibold hover:underline">Fazer Login</a>
        </p>
    </div>

    <!-- Tela de Boas-vindas -->
    <div id="welcome-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Bem-vindo!</h2>
        <p class="text-center text-gray-600 mb-6">
            Você está logado como <span id="display-user" class="font-bold text-indigo-600"></span>
        </p>
        
        <button onclick="logout()" class="w-full border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-md hover:bg-gray-100 transition-colors">
            Sair do Sistema
        </button>

        <button onclick="accessar()" class="w-full border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-md hover:bg-gray-100 transition-colors">
            Acessar sistema
        </button>



    </div> 

    <!-- JS externo -->
     
    <script src="javascript.js"></script>


    <script>
function mascaraCEP(campo) {
  let valor = campo.value.replace(/\D/g, '');

  if (valor.length > 5) {
    valor = valor.substring(0, 5) + '-' + valor.substring(5, 8);
  }

  campo.value = valor;
}

function pesquisacep(valor) {
  let cep = valor.replace(/\D/g, '');

  if (cep.length !== 8) {
    alert("CEP inválido!");
    return;
  }

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(dados => {
      document.getElementById("signup-address").value = dados.logradouro;
      document.getElementById("signup-UF").value = dados.uf;
      document.getElementById("signup-bairro").value = dados.bairro
      document.getElementById("signup-complemento").value = dados.complemento


    });
}
</script>

</body>
</html>
